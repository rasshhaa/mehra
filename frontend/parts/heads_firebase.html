<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEHRA - Unified Vehicle Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
   <!-- Firebase SDK -->
<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
             signOut, onAuthStateChanged, updateProfile }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection,
             addDoc, getDocs, query, orderBy, updateDoc, deleteDoc, onSnapshot }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBn5K3h_8OYVkAdY6316hEcqPde7ap0q7k",
        authDomain: "mehra-b3a7c.firebaseapp.com",
        projectId: "mehra-b3a7c",
        storageBucket: "mehra-b3a7c.firebasestorage.app",
        messagingSenderId: "371577035720",
        appId: "1:371577035720:web:68b9405b8b52a1bb003efd",
        measurementId: "G-DPZYWEX3HM"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Auth helpers
    window._fbAuth          = auth;
    window._fbDb            = db;
    window._fbCreateUser    = createUserWithEmailAndPassword;
    window._fbSignIn        = signInWithEmailAndPassword;
    window._fbSignOut       = signOut;
    window._fbOnAuth        = onAuthStateChanged;
    window._fbUpdateProfile = updateProfile;

    // Firestore helpers — THIS IS THE IMPORTANT PART
    window._fsDoc         = doc;
    window._fsSetDoc      = setDoc;
    window._fsGetDoc      = getDoc;
    window._fsCollection  = collection;
    window._fsAddDoc      = addDoc;
    window._fsGetDocs     = getDocs;
    window._fsQuery       = query;
    window._fsOrderBy     = orderBy;
    window._fsUpdateDoc   = updateDoc;
    window._fsDeleteDoc   = deleteDoc;
    window._fsOnSnapshot  = onSnapshot;   // ← MUST be here

    onAuthStateChanged(auth, user => {
        window._currentUser = user || null;
        if (window._handleAuthChange) window._handleAuthChange(user);
    });
</script>
</head>
